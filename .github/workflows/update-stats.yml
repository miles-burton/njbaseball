name: Update Stats

on:
  schedule:
    # Runs daily at 7am ET (11:00 UTC) during baseball season
    - cron: '0 11 * * *'
  workflow_dispatch: # also allows manual trigger from GitHub UI

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install certifi

      - name: Run scraper
        run: python3 scraper.py

      - name: Commit and push if data changed
        run: |
          git config user.name  "Diamond Index Bot"
          git config user.email "bot@diamondindex.com"
          git add js/data.js
          git diff --staged --quiet || git commit -m "Auto-update stats $(date +'%Y-%m-%d')"
          git push
