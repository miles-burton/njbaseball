name: Update Stats

on:
  schedule:
    # Runs every two hours from 7am-7pm ET, plus a 10pm ET late-score refresh.
    - cron: '0 11,13,15,17,19,21,23 * * *'
    - cron: '0 2 * * *'
  workflow_dispatch: # also allows manual trigger from GitHub UI

permissions:
  contents: write

concurrency:
  group: update-stats
  cancel-in-progress: false

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install certifi

      - name: Run scraper
        run: python3 scraper.py

      - name: Commit and push if data changed
        run: |
          git config user.name  "Diamond Index Bot"
          git config user.email "bot@diamondindex.com"
          git add js/data.js js/player_logs.js
          git diff --staged --quiet || git commit -m "Auto-update stats $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
